name: super_kids_tv
description: App TV sicura per bambini - niente pubblicità, niente Shorts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Player Video (senza chewie - controlli custom) ---
  video_player: ^2.8.6

  # --- YouTube (no ads, no shorts) ---
  youtube_explode_dart: ^2.5.3

  # --- Networking ---
  http: ^1.2.1
  dio: ^5.4.3

  # --- State Management ---
  provider: ^6.1.2

  # --- Persistenza dati ---
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # --- UI ---
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  lottie: ^3.1.0

  # --- Utilità ---
  wakelock_plus: ^1.2.5
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/channels/
    - assets/icon/
    - assets/animations/
