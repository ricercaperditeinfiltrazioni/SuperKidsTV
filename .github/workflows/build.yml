name: 🔨 Build APK SuperKidsTV

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK Flutter
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout codice
        uses: actions/checkout@v4

      - name: ☕ Installa Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Installa Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📝 Genera local.properties
        run: |
          FLUTTER_PATH=$(dirname $(which flutter))
          FLUTTER_SDK=$(dirname $FLUTTER_PATH)
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_SDK" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          cat android/local.properties

      - name: 📦 Installa dipendenze
        run: flutter pub get

      - name: 🖼️ Genera icone app
        run: flutter pub run flutter_launcher_icons
        continue-on-error: true

      - name: 🔍 Analisi codice
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🏗️ Compila APK Release
        run: flutter build apk --release --split-per-abi

      - name: 📝 Rinomina APK
        run: |
          DATE=$(date +'%Y-%m-%d_%H-%M')
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             artifacts/SuperKidsTV_${DATE}_arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             artifacts/SuperKidsTV_${DATE}_arm32.apk || true

      - name: 📤 Carica APK su GitHub
        uses: actions/upload-artifact@v4
        with:
          name: SuperKidsTV-APK
          path: artifacts/*.apk
          retention-days: 30
